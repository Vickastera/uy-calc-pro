<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UY Calc Pro</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <h1>💰 UY Calc Pro</h1>

  <input id="salary" type="number" placeholder="Sueldo bruto">

  <select id="type">
    <option value="salary">Sueldo normal</option>
    <option value="resignation">Renuncia</option>
    <option value="dismissal">Despido</option>
  </select>

  <!-- TOGGLE PRO -->
  <div class="toggle-row">
    <span>Con hijos</span>

    <label class="switch">
      <input type="checkbox" id="children">
      <span class="slider"></span>
    </label>
  </div>

  <button onclick="calculate()">Calcular</button>

  <div id="result"></div>

  <canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
