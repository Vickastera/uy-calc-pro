<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>UY Calc Pro</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">

  <h1>💰 UY Calc Pro</h1>

  <input id="salary" type="number" placeholder="Sueldo bruto" />

  <select id="type">
    <option value="salary">Sueldo normal</option>
    <option value="resignation">Renuncia</option>
    <option value="dismissal">Despido</option>
  </select>

  <label>
    <input type="checkbox" id="children" />
    Con hijos
  </label>

  <button onclick="calculate()">Calcular</button>
  <button onclick="downloadPDF()">Descargar PDF</button>

  <div id="result"></div>

  <!-- 📊 GRÁFICO -->
  <canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
